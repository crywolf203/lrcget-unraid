name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: crywolf203/lrcget-unraid

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get latest LRCGET version
        id: lrcget
        shell: bash
        run: |
          VERSION="$(curl -fsSL https://api.github.com/repos/tranxuanthang/lrcget/releases/latest \
            | grep '"tag_name":' \
            | head -n 1 \
            | sed -E 's/.*"tag_name": *"v?([^"]+)".*/\1/')"

          if [ -z "$VERSION" ]; then
            echo "Could not determine latest LRCGET version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest LRCGET version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            LRCGET_VERSION=${{ steps.lrcget.outputs.version }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.lrcget.outputs.version }}
