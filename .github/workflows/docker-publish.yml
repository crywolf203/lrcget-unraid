name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: crywolf203/lrcget-unraid
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get latest LRCGET version
        id: lrcget
        shell: bash
        run: |
          VERSION="$(curl -fsSL https://api.github.com/repos/tranxuanthang/lrcget/releases/latest \
            | grep '"tag_name":' \
            | head -n 1 \
            | sed -E 's/.*"tag_name": *"v?([^"]+)".*/\1/')"

          if [ -z "$VERSION" ]; then
            echo "Could not determine latest LRCGET version."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest LRCGET version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if LRCGET version image already exists
        id: image_exists
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.lrcget.outputs.version }}"

          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image already exists: $IMAGE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image does not exist yet: $IMAGE"
          fi

      - name: Set up Docker Buildx
        if: github.event_name != 'schedule' || steps.image_exists.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: github.event_name != 'schedule' || steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            LRCGET_VERSION=${{ steps.lrcget.outputs.version }}
            IMAGE_VERSION=1.0.0
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.lrcget.outputs.version }}
